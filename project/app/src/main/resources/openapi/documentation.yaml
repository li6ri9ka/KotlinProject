openapi: 3.0.3
info:
  title: Shop Service API
  version: 0.1.0
  description: |
    Draft API contract for shop backend.
servers:
  - url: http://localhost:8080

paths:
  /auth/register:
    post:
      summary: Register user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /products:
    get:
      summary: List products
      tags: [Products]
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
    post:
      summary: Create product (admin)
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created

  /products/{id}:
    get:
      summary: Get product by id
      tags: [Products]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
    put:
      summary: Update product (admin)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
    delete:
      summary: Delete product (admin)
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted

  /orders:
    post:
      summary: Create order
      tags: [Orders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreatedResponse'
    get:
      summary: List my orders
      tags: [Orders]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'

  /orders/{id}:
    delete:
      summary: Cancel order
      tags: [Orders]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order canceled

  /stats/orders:
    get:
      summary: Orders statistics (admin)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersStatsResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        tokenType: { type: string }
    CreateProductRequest:
      type: object
      required: [name, description, price, stock]
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: string }
        stock: { type: integer }
    UpdateProductRequest:
      type: object
      required: [name, description, price, stock]
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: string }
        stock: { type: integer }
    ProductResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string }
        price: { type: string }
        stock: { type: integer }
    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'
    CreateOrderItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer, format: int64 }
        quantity: { type: integer }
    OrderCreatedResponse:
      type: object
      properties:
        orderId: { type: integer, format: int64 }
    OrderResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        status: { type: string }
        total: { type: string }
        createdAt: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
    OrderItemResponse:
      type: object
      properties:
        productId: { type: integer, format: int64 }
        quantity: { type: integer }
        unitPrice: { type: string }
    OrdersStatsResponse:
      type: object
      properties:
        totalOrders: { type: integer, format: int64 }
        canceledOrders: { type: integer, format: int64 }
        createdOrders: { type: integer, format: int64 }
        totalRevenue: { type: string }
